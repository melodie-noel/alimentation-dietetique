<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" role="img" aria-label="Un atelier nutrition en entreprise : une intervenante présente devant une petite équipe">
  <defs>
    <linearGradient id="eBoard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBF4E4"/>
    </linearGradient>
  </defs>

  <!-- halo doux -->
  <circle cx="150" cy="128" r="120" fill="#FFFFFF" opacity=".55"/>
  <ellipse cx="150" cy="252" rx="118" ry="14" fill="#1E3A14" opacity=".06"/>

  <!-- TABLEAU / PAPERBOARD sur chevalet -->
  <g>
    <path d="M120 150 96 244" stroke="#7A5A38" stroke-width="5" stroke-linecap="round"/>
    <path d="M196 150 220 244" stroke="#7A5A38" stroke-width="5" stroke-linecap="round"/>
    <rect x="92" y="40" width="132" height="120" rx="10" fill="url(#eBoard)" stroke="#E4D8C0" stroke-width="2"/>
    <!-- courbe de progression -->
    <path d="M108 132 134 104 154 118 188 70" fill="none" stroke="#4E9D3F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M176 70h12v12" fill="none" stroke="#4E9D3F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="108" cy="132" r="3.4" fill="#EE5B47"/>
    <circle cx="134" cy="104" r="3.4" fill="#F3AE26"/>
    <circle cx="154" cy="118" r="3.4" fill="#F4863F"/>
    <!-- petite feuille -->
    <path d="M196 96c8-2 15 3 15 11-8 2-15-3-15-11Z" fill="#73B85F"/>
    <line x1="120" y1="150" x2="196" y2="150" stroke="#E4D8C0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- INTERVENANTE -->
  <g>
    <circle cx="246" cy="120" r="13" fill="#EFCBA8"/>
    <path d="M234 116c0-9 6-15 12-15s12 6 12 13c-3-2-7-3-12-3-4 0-9 2-12 5Z" fill="#5A3A22"/>
    <path d="M232 196c0-18 7-30 14-30s14 12 14 30Z" fill="#EE5B47"/>
    <path d="M236 150c-7 4-11 12-12 22" fill="none" stroke="#EFCBA8" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- PETITE ÉQUIPE (audience) -->
  <g>
    <g transform="translate(96,196)">
      <circle cx="0" cy="0" r="12" fill="#EFCBA8"/>
      <path d="M-18 44c0-15 8-24 18-24s18 9 18 24Z" fill="#F3AE26"/>
    </g>
    <g transform="translate(140,202)">
      <circle cx="0" cy="0" r="12" fill="#E6B58E"/>
      <path d="M-18 40c0-15 8-24 18-24s18 9 18 24Z" fill="#4E9D3F"/>
    </g>
    <g transform="translate(184,198)">
      <circle cx="0" cy="0" r="12" fill="#EFCBA8"/>
      <path d="M-18 44c0-15 8-24 18-24s18 9 18 24Z" fill="#B85420"/>
    </g>
  </g>
</svg>
