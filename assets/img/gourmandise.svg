<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 300" role="img" aria-label="Une gourmandise en équilibre : un cupcake posé sur une pomme verte">
  <defs>
    <linearGradient id="gApple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#73B85F"/>
      <stop offset="1" stop-color="#4E9D3F"/>
    </linearGradient>
    <linearGradient id="gCream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFBF2"/>
      <stop offset="1" stop-color="#FBEBC4"/>
    </linearGradient>
    <linearGradient id="gWrap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4863F"/>
      <stop offset="1" stop-color="#EE5B47"/>
    </linearGradient>
  </defs>

  <!-- halo doux -->
  <circle cx="130" cy="158" r="118" fill="#FBF4E4"/>
  <ellipse cx="130" cy="276" rx="78" ry="13" fill="#000" opacity=".05"/>

  <!-- POMME (équilibre, fraîcheur) -->
  <g>
    <path d="M130 150c-30-9-58 8-58 50 0 40 28 70 58 70s58-30 58-70c0-42-28-59-58-50Z" fill="url(#gApple)"/>
    <path d="M104 188c4-9 12-15 22-16" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity=".45"/>
  </g>

  <!-- CUPCAKE (gourmandise) posé en équilibre -->
  <g transform="translate(0,-6)">
    <!-- caissette -->
    <path d="M93 96h74l-9 46a10 10 0 0 1-10 8h-36a10 10 0 0 1-10-8Z" fill="url(#gWrap)"/>
    <path d="M101 104v44M115 104v46M130 104v46M145 104v46M159 104v44" stroke="#fff" stroke-width="3" opacity=".35" stroke-linecap="round"/>
    <!-- glaçage -->
    <path d="M130 36c-15 0-26 9-29 22-13 1-22 11-22 23 0 9 6 16 14 18 1 0 84 0 85 0 9-2 15-9 15-18 0-12-9-22-22-23-3-13-14-22-29-22Z" fill="url(#gCream)"/>
    <path d="M88 99c8 3 20 4 42 4s34-1 42-4" fill="none" stroke="#F3AE26" stroke-width="3" stroke-linecap="round" opacity=".5"/>
    <!-- vermicelles -->
    <circle cx="108" cy="74" r="3" fill="#EE5B47"/>
    <circle cx="132" cy="66" r="3" fill="#4E9D3F"/>
    <circle cx="152" cy="78" r="3" fill="#F4863F"/>
    <circle cx="120" cy="86" r="3" fill="#F3AE26"/>
    <circle cx="146" cy="90" r="3" fill="#EE5B47"/>
    <!-- fraise sommet -->
    <path d="M130 30c-7 0-13 5-13 12 0 8 6 14 13 18 7-4 13-10 13-18 0-7-6-12-13-12Z" fill="#EE5B47"/>
    <path d="M124 28c2-5 10-5 12 0-2 3-10 3-12 0Z" fill="#4E9D3F"/>
    <circle cx="125" cy="42" r="1.3" fill="#FFFBF2"/>
    <circle cx="134" cy="46" r="1.3" fill="#FFFBF2"/>
    <circle cx="130" cy="52" r="1.3" fill="#FFFBF2"/>
  </g>
</svg>
